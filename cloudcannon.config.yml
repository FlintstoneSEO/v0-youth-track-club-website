version: latest
timezone: America/New_York

paths:
  static: public
  uploads: public/images

collections_config:
  pages:
    path: src/content/pages
    name: Pages
    singular_name: Page
    icon: wysiwyg
    url: "/[slug]/"
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: .cloudcannon/schemas/page-builder.md
        name: Page Builder
    add_options:
      - name: Page Builder
        schema: page_builder
        icon: dashboard
  events:
    path: src/content/events
    name: Events
    singular_name: Event
    icon: event
    disable_url: true
    _enabled_editors:
      - visual
      - data
    add_options:
      - name: Event
  announcements:
    path: src/content/announcements
    name: Announcements
    singular_name: Announcement
    icon: campaign
    disable_url: true
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Announcement
  faqs:
    path: src/content/faqs
    name: FAQs
    singular_name: FAQ
    icon: help
    disable_url: true
    _enabled_editors:
      - visual
      - data
    add_options:
      - name: FAQ
  runThaCityEvents:
    path: src/content/run-tha-city-events
    name: Run Tha City Events
    singular_name: Run Tha City Event
    icon: directions_run
    disable_url: true
    _enabled_editors:
      - visual
      - data
    add_options:
      - name: Run Tha City Event
  sponsors:
    path: src/content/sponsors
    name: Sponsors
    singular_name: Sponsor
    icon: handshake
    disable_url: true
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Sponsor

data_config:
  site:
    path: src/data/site.json
  navigation:
    path: src/data/navigation.json
  footer:
    path: src/data/footer.json
  practice-schedule:
    path: src/data/practice-schedule.json

collection_groups:
  - heading: Site Content
    collections:
      - pages
      - events
      - announcements
      - faqs
      - runThaCityEvents
      - sponsors
  - heading: Settings
    collections:
      - site
      - navigation
      - footer
      - practice-schedule

_select_data:
  event_types:
    - meet
    - practice
    - community
    - fundraiser
    - other
  announcement_priorities:
    - urgent
    - high
    - normal
    - low
  faq_categories:
    - general
    - registration
    - practices
    - meets
    - equipment
    - other
  run_difficulties:
    - all_levels
    - beginner
    - intermediate
    - advanced
  sponsor_levels:
    - partner
    - gold
    - silver
    - bronze
    - community

_structures:
  links:
    values:
      - label: Link
        value:
          label: New Link
          url: /
  navigation_items:
    values:
      - label: Navigation Item
        value:
          label: New Page
          url: /
  footer_columns:
    values:
      - label: Footer Column
        value:
          heading: Column
          links:
            - label: Link
              url: /
  practice_items:
    values:
      - label: Practice Schedule
        value:
          age_group: Age Group
          days: Practice Days
          time: Practice Time
          location: Practice Location
          focus: Training focus
  actions:
    values:
      - label: Action
        preview:
          text:
            - key: label
            - Action
          icon:
            - ads_click
        value:
          label: Button
          url: /
          style: primary
  cards:
    values:
      - label: Card
        preview:
          text:
            - key: title
            - Card
          subtext:
            - key: description
          icon:
            - dashboard
        value:
          title: Card title
          description: Card description
          icon: Target
          meta: ""
          links: []
  content_blocks:
    values:
      - label: Hero
        preview:
          text:
            - key: title
            - Hero
          icon:
            - flag
        value:
          _type: hero
          eyebrow: ""
          title: Hero title
          subtitle: ""
          description: ""
          image: ""
          logo: ""
          tone: primary
          actions: []
      - label: Text Section
        preview:
          text:
            - key: title
            - Text Section
          icon:
            - article
        value:
          _type: text_section
          eyebrow: ""
          title: Section title
          content: "<p>Section content.</p>"
          align: center
          tone: default
          actions: []
      - label: Card Grid
        preview:
          text:
            - key: title
            - Card Grid
          icon:
            - dashboard
        value:
          _type: card_grid
          eyebrow: ""
          title: Card grid
          subtitle: ""
          tone: default
          columns: "3"
          cards: []
      - label: Collection List
        preview:
          text:
            - key: title
            - Collection List
          icon:
            - dynamic_feed
        value:
          _type: collection_list
          title: Collection List
          subtitle: ""
          collection: events
          limit: 0
          tone: default
          empty_text: ""
          actions: []
      - label: Practice Schedule
        preview:
          text:
            - key: title
            - Practice Schedule
          icon:
            - event
        value:
          _type: practice_schedule
          title: Weekly Schedule
          subtitle: ""
      - label: Area Served
        preview:
          text:
            - key: title
            - Area Served
          icon:
            - location_on
        value:
          _type: area_served
          eyebrow: ""
          title: Areas Served
          subtitle: ""
      - label: Contact Forms
        preview:
          text:
            - key: contact_title
            - Contact Forms
          icon:
            - contact_mail
        value:
          _type: contact_forms
          registration_title: Athlete Registration
          registration_description: ""
          contact_title: Get in Touch
          contact_description: ""
          volunteer_title: Interested in Volunteering?
          volunteer_description: ""

_inputs:
  title:
    type: text
  description:
    type: textarea
  event_date:
    type: date
  start_time:
    type: text
  location:
    type: text
  event_type:
    type: select
    options:
      values: _select_data.event_types
  is_featured:
    type: switch
  is_published:
    type: switch
  registration_url:
    type: url
  priority:
    type: select
    options:
      values: _select_data.announcement_priorities
  published_at:
    type: date
  question:
    type: textarea
  answer:
    type: textarea
  category:
    type: select
    options:
      values: _select_data.faq_categories
  sort_order:
    type: number
  meeting_point:
    type: text
  distance:
    type: text
  difficulty:
    type: select
    options:
      values: _select_data.run_difficulties
  website:
    type: url
  logo:
    type: image
  level:
    type: select
    options:
      values: _select_data.sponsor_levels
  _schema:
    hidden: true
  content_blocks:
    type: array
    options:
      structures: _structures.content_blocks
  actions:
    type: array
    options:
      structures: _structures.actions
  cards:
    type: array
    options:
      structures: _structures.cards
  links:
    type: array
    options:
      structures: _structures.links
  content:
    type: html
    options:
      allow_custom_markup: true
  image:
    type: image
  tone:
    type: select
    options:
      values:
        - default
        - muted
        - primary
        - dark
        - success
        - light
  style:
    type: select
    options:
      values:
        - primary
        - accent
        - light
        - outline
        - success
        - red
  align:
    type: select
    options:
      values:
        - left
        - center
  columns:
    type: select
    options:
      values:
        - "2"
        - "3"
        - "4"
  collection:
    type: select
    options:
      values:
        - events
        - announcements
        - faqs
        - runThaCityEvents

file_config:
  - glob: src/data/site.json
    _inputs:
      name:
        type: text
      short_name:
        type: text
      founder:
        type: text
      email:
        type: email
      site_url:
        type: url
      description:
        type: textarea
      area_served:
        type: array
  - glob: src/data/navigation.json
    _inputs:
      items:
        type: array
        options:
          structures: _structures.navigation_items
  - glob: src/data/footer.json
    _inputs:
      description:
        type: textarea
      service_area_note:
        type: textarea
      columns:
        type: array
        options:
          structures: _structures.footer_columns
      social_links:
        type: array
        options:
          structures: _structures.links
      credit:
        type: text
      credit_url:
        type: url
  - glob: src/data/practice-schedule.json
    _inputs:
      schedule:
        type: array
        options:
          structures: _structures.practice_items
      what_to_bring:
        type: array
      expectations:
        type: array
      timeline:
        type: array
_editables:
  content:
    bold: true
    italic: true
    link: true
    bulletedlist: true
    numberedlist: true
    blockquote: true
    format: p h2 h3 h4
    removeformat: true
